apiVersion: v1
kind: Namespace
metadata:
  name: jjaramillo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: jjaramillo
data:
  USER_KEY: "LAB3_USER_KEY_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: jjaramillo
type: Opaque
data:
  # 'password123' en base64
  BD_PASSWORD: cGFzc3dvcmQxMjM= 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-devops
  namespace: jjaramillo
spec:
  replicas: 3 # REQUISITO: 3 réplicas
  selector:
    matchLabels:
      app: curso-devops
  template:
    metadata:
      labels:
        app: curso-devops
    spec:
      containers:
      - name: app
        # REQUISITO: Imagen de GitHub (GHCR)
        image: ghcr.io/jnjaramillom-sketch/curso-devops-lab3:latest
        ports:
        - containerPort: 3000
        env:
        # REQUISITO: Variable de entorno desde ConfigMap
        - name: USER_KEY
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: USER_KEY
        # REQUISITO: Variable de entorno desde Secret
        - name: BD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: BD_PASSWORD
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: curso-devops-service
  namespace: jjaramillo
spec:
  type: NodePort
  selector:
    app: curso-devops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30008
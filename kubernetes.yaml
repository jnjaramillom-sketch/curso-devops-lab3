apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curso-devops
  template:
    metadata:
      labels:
        app: curso-devops
    spec:
      containers:
      - name: app
        image: jnjaramillom/curso-devops-lab3:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: curso-devops-service
spec:
  type: NodePort
  selector:
    app: curso-devops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30007